<main class="main">
  <div class="content">
    <div class="search-section">
      <h1>RECHERCHER UN DOCUMENT</h1>
      <div class="row">
        <span class="side left">ICI</span>
        <div class="row">
          <span class="side left"></span>
          <select (change)="onManuscriptSelected($event)">
            <option>Sélectionner un manuscrit</option>

            @for (m of manuscripts; track m.id) {
            <option [value]="m.id">
              {{ m.title }}
            </option>
            }
            
          </select>
        </div>
        <span class="side right"></span>
      </div>

      <div class="upload">
        <app-manuscript-upload></app-manuscript-upload>
      </div>
    </div>

    <div class="results">
      <app-manuscript-pannel [manuscript]="selectedManuscript"></app-manuscript-pannel>
    </div>
  </div>
</main>
