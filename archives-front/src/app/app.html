<main class="main">
  <div class="content">
    <div class="search-section">
      <div class="search-header">
        <p class="eyebrow">Archives manuscrites</p>
        <h1>Rechercher un document</h1>
      </div>

      <div class="search-actions">
        <label class="select-field">
          <span>Manuscrit</span>
          <select (change)="onManuscriptSelected($event)">
            <option value="">Sélectionner un manuscrit</option>

            @for (m of manuscripts; track m.id) {
              <option [value]="m.id">
                {{ m.title }}
              </option>
            }
          </select>
        </label>

        <!-- <app-manuscript-upload></app-manuscript-upload> -->
      </div>
    </div>

    <div class="results">
      <app-manuscript-pannel [manuscript]="selectedManuscript"></app-manuscript-pannel>
    </div>
  </div>
</main>
